name: Secure RDP via Tailscale (Automated Loop)

on:
  workflow_dispatch:
    inputs:
      gh_api_token:
        description: "🔒 ToolboxLap | ENTER YOUR GITHUB PAT HERE (Starts with ghp_...)"
        required: true
        default: ""
      loops:
        description: "🔄 System Internal Counter (Leave Empty - Managed Automatically)"
        required: false
        default: ""

concurrency:
  group: rdp-loop-singleton
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  secure-rdp:
    runs-on: windows-2025
    timeout-minutes: 310
    env:
      REPO_FULL: ${{ github.repository }}
      REF_NAME: ${{ github.ref_name }}
      GH_TOKEN: ${{ github.event.inputs.gh_api_token }}
      TS_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
    steps:
      - name: 📥 Checkout repo (to get the script)
        uses: actions/checkout@v4

      - name: 🔒 Run RDP automation script
         run: pwsh -File ./secure-rdp.ps1
